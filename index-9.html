function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function sample(arr, n) {
  return shuffleArr(arr).slice(0, Math.min(n, arr.length));
}
function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
}
function getExamConfig(course) {
  const total = Math.min(50, course.bank.length);
  const minutes = Math.max(12, Math.round(total * 0.6));
  return { total, minutes };
}

function getLocal(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}
function setLocal(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}

function ParticleField({ intensity = 1 }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const reduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let raf, w, h, particles = [];

    function init() {
      w = canvas.clientWidth;
      h = canvas.clientHeight;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      particles = [];
      const cols = Math.max(6, Math.floor(14 * intensity));
      const rows = Math.max(6, Math.floor(10 * intensity));
      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          const ox = w * 0.5 + (i / cols) * w * 0.48 + w * 0.02;
          const oy = (j / rows) * h;
          particles.push({ x: ox, y: oy, ox, oy, vx: 0, vy: 0, ordered: true });
        }
      }
      const chaosCount = Math.floor(cols * rows * 0.75);
      for (let k = 0; k < chaosCount; k++) {
        particles.push({
          x: Math.random() * w * 0.5, y: Math.random() * h,
          ox: 0, oy: 0,
          vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
          ordered: false,
        });
      }
    }
    function step() {
      ctx.clearRect(0, 0, w, h);
      particles.forEach((p) => {
        if (p.ordered) {
          p.x += (p.ox - p.x) * 0.04;
          p.y += (p.oy - p.y) * 0.04;
        } else {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0 || p.x > w * 0.55) p.vx *= -1;
          if (p.y < 0 || p.y > h) p.vy *= -1;
        }
        ctx.beginPath();
        ctx.fillStyle = p.ordered ? "rgba(212,175,55,0.5)" : "rgba(184,115,59,0.4)";
        ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);
        ctx.fill();
      });
      if (!reduced) raf = requestAnimationFrame(step);
    }
    init();
    step();
    const onResize = () => init();
    window.addEventListener("resize", onResize);
    return () => { window.removeEventListener("resize", onResize); if (raf) cancelAnimationFrame(raf); };
  }, [intensity]);
  return <canvas ref={canvasRef} className="absolute inset-0 w-full h-full pointer-events-none" />;
}

          <button onClick={() => setScreen("leaderboard")} className={screen === "leaderboard" ? "" : "opacity-60"} style={{ color: C.gold }}>Leaderboard</button>
        </div>
      </div>
    </div>
  );
}

      <section className="relative overflow-hidden" style={{ minHeight: "78vh" }}>

        <div className="relative z-10 max-w-4xl mx-auto px-6 pt-20 pb-24 text-center flex flex-col items-center">
          <Logo size={120} />
          <h1 className="f-display font-bold mt-8 text-4xl sm:text-5xl leading-tight" style={{ color: C.ivory }}>
            Turn exam chaos<br />into <span style={{ color: C.gold }}>mastery</span>.
          </h1>
          <p className="f-body mt-5 max-w-xl text-base sm:text-lg" style={{ color: C.slate }}>

          </p>
          <div className="flex flex-wrap gap-3 mt-8 justify-center">
            <GoldButton onClick={() => setScreen("courses")}>Start Practicing</GoldButton>
            <GoldButton onClick={() => setScreen("leaderboard")} variant="ghost">View Leaderboard</GoldButton>
          </div>
          <div className="grid grid-cols-3 gap-4 mt-14 w-full max-w-md">
            {[[COURSES.length, "Courses"], [totalQuestions, "Questions"], ["50", "Per Exam"]].map(([num, label]) => (
              <div key={label} className="rounded-lg py-4" style={{ border: `1px solid ${C.hair}`, background: "rgba(255,255,255,0.02)" }}>
                <div className="f-mono font-bold text-2xl" style={{ color: C.gold }}>{num}</div>
                <div className="f-mono text-[10px] uppercase tracking-widest mt-1" style={{ color: C.slate }}>{label}</div>
              </div>
            ))}

        </div>
      </section>
      <section className="max-w-5xl mx-auto px-6 py-16">
        <h2 className="f-display font-bold text-2xl text-center mb-10" style={{ color: C.ivory }}>Built for how you actually study</h2>
        <div className="grid sm:grid-cols-3 gap-5">
          {[
            ["Real past questions", "Pulled straight from compiled course CA/CBT banks, not generic filler."],
            ["Timed, randomized", "Every attempt pulls a fresh shuffled set so you cannot just memorize the order."],

}

function CourseList({ setScreen, setActiveCourse }) {
  return (
    <div className="max-w-4xl mx-auto px-6 py-14">
      <h1 className="f-display font-bold text-3xl mb-2" style={{ color: C.ivory }}>Choose a course</h1>
      <p className="f-body text-sm mb-8" style={{ color: C.slate }}>Pick a course to start a timed practice exam.</p>
      <div className="grid sm:grid-cols-3 gap-5">
        {COURSES.map((c) => (
          <button key={c.id} onClick={() => { setActiveCourse(c); setScreen("instructions"); }}
            className="text-left rounded-xl p-6 transition-transform hover:-translate-y-1"
            style={{ border: `1px solid ${C.hair}`, background: "rgba(255,255,255,0.02)" }}>
            <div className="f-display font-bold text-3xl mb-3" style={{ color: C.gold }}>{c.glyph}</div>
            <div className="f-mono text-xs uppercase tracking-widest" style={{ color: C.slate }}>{c.code}</div>
            <div className="f-display font-bold text-lg mt-1" style={{ color: C.ivory }}>{c.title}</div>
            <div className="f-body text-sm mt-2" style={{ color: C.slate }}>{c.blurb}</div>
            <div className="f-mono text-[11px] mt-4" style={{ color: C.gold }}>{c.bank.length} questions in bank →</div>
          </button>
        ))}
      </div>
    </div>
  );
}

function Instructions({ course, setScreen, onStart }) {
  const cfg = getExamConfig(course);
  return (
    <div className="max-w-2xl mx-auto px-6 py-14">
      <button onClick={() => setScreen("courses")} className="f-mono text-xs mb-6" style={{ color: C.slate }}>&larr; Back to courses</button>
      <div className="f-display font-bold text-2xl mb-1" style={{ color: C.ivory }}>{course.code} — {course.title}</div>
      <p className="f-body text-sm mb-8" style={{ color: C.slate }}>Read the rules before you begin.</p>
      <div className="grid grid-cols-2 gap-4 mb-8">
        {[[cfg.total, "Questions"], [`${cfg.minutes}:00`, "Time Limit"], ["A–D", "Per Question"], ["1", "Point Each"]].map(([v, l]) => (
          <div key={l} className="rounded-lg py-4 text-center" style={{ border: `1px solid ${C.hair}` }}>
            <div className="f-mono font-bold text-xl" style={{ color: C.gold }}>{v}</div>
            <div className="f-mono text-[10px] uppercase tracking-widest mt-1" style={{ color: C.slate }}>{l}</div>
          </div>
        ))}
      </div>
      <ul className="f-body text-sm space-y-2 mb-10" style={{ color: C.slate }}>
        <li>• Questions are pulled randomly from the {course.id} question bank — every attempt is different.</li>
        <li>• The exam auto-submits when the timer hits zero.</li>
        <li>• You can move freely between questions using the grid before submitting.</li>
        <li>• Your topic-level breakdown is shown right after you submit.</li>
      </ul>
      <GoldButton full onClick={onStart}>Begin Exam</GoldButton>
    </div>
  );
}

function Exam({ course, questions, currentIdx, setCurrentIdx, answers, setAnswers, timeLeft, onSubmitRequest }) {
  const q = questions[currentIdx];
  const answeredCount = Object.keys(answers).length;
  const low = timeLeft < 60;
  return (
    <div className="max-w-3xl mx-auto px-5 py-6">
      <div className="flex items-center justify-between mb-5">
        <div className="f-mono text-xs uppercase tracking-widest" style={{ color: C.slate }}>{course.code}</div>
        <div className={`f-mono font-bold text-lg ${low ? "scy-pulse" : ""}`} style={{ color: low ? C.copper : C.gold }}>
          ⏱ {fmtTime(timeLeft)}
        </div>
      </div>
      <div className="flex flex-wrap gap-1.5 mb-6">
        {questions.map((_, i) => {
          const isAnswered = answers[i] !== undefined;
          const isCurrent = i === currentIdx;
          return (
            <button key={i} onClick={() => setCurrentIdx(i)} className="f-mono text-[11px] w-7 h-7 rounded flex items-center justify-center"
              style={{
                background: isCurrent ? C.gold : isAnswered ? "rgba(212,175,55,0.18)" : "transparent",
                color: isCurrent ? "#0a0a0b" : isAnswered ? C.gold : C.slate,
                border: `1px solid ${isCurrent ? C.gold : C.hair}`,
              }}>
              {i + 1}
            </button>
          );
        })}
      </div>
      <div className="f-mono text-xs mb-2" style={{ color: C.slate }}>Question {currentIdx + 1} of {questions.length} · {answeredCount} answered</div>
      <div className="rounded-xl p-6 mb-6" style={{ border: `1px solid ${C.hair}`, background: "rgba(255,255,255,0.02)" }}>
        <div className="f-body text-lg leading-relaxed mb-6" style={{ color: C.ivory }}>{q.q}</div>
        <div className="space-y-3">
          {q.options.map((opt, i) => {
            const selected = answers[currentIdx] === i;
            return (
              <button key={i} onClick={() => setAnswers((prev) => ({ ...prev, [currentIdx]: i }))}
                className="w-full text-left rounded-lg px-4 py-3 f-body text-sm flex gap-3 items-start"
                style={{ border: `1px solid ${selected ? C.gold : C.hair}`, background: selected ? "rgba(212,175,55,0.1)" : "transparent", color: C.ivory }}>
                <span className="f-mono font-bold" style={{ color: selected ? C.gold : C.slate }}>{String.fromCharCode(65 + i)}</span>
                <span>{opt}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div className="flex items-center justify-between">
        <GoldButton variant="ghost" disabled={currentIdx === 0} onClick={() => setCurrentIdx((i) => Math.max(0, i - 1))}>&larr; Prev</GoldButton>
        {currentIdx === questions.length - 1 ? (
          <GoldButton onClick={onSubmitRequest}>Submit Exam</GoldButton>
        ) : (
          <GoldButton onClick={() => setCurrentIdx((i) => Math.min(questions.length - 1, i + 1))}>Next &rarr;</GoldButton>
        )}
      </div>
    </div>
  );
}

function SubmitModal({ answeredCount, total, onCancel, onConfirm }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center px-6" style={{ background: "rgba(0,0,0,0.7)" }}>
      <div className="rounded-xl p-6 max-w-sm w-full" style={{ background: C.void2, border: `1px solid ${C.hair}` }}>
        <div className="f-display font-bold text-lg mb-2" style={{ color: C.ivory }}>Submit exam?</div>
        <p className="f-body text-sm mb-6" style={{ color: C.slate }}>
          You have answered {answeredCount} of {total} questions. Unanswered questions will be marked incorrect.
        </p>
        <div className="flex gap-3">
          <GoldButton variant="ghost" full onClick={onCancel}>Keep Going</GoldButton>
          <GoldButton full onClick={onConfirm}>Submit</GoldButton>
        </div>
      </div>
    </div>
  );
}

function Results({ course, questions, answers, timeUsed, setScreen, onRetake, leaderboardSaved, onSaveLeaderboard, savingName, setSavingName }) {
  const total = questions.length;
  let correctCount = 0;
  const topicMap = {};
  questions.forEach((q, i) => {
    const isCorrect = answers[i] === q.correct;
    if (isCorrect) correctCount++;
    if (!topicMap[q.topic]) topicMap[q.topic] = { correct: 0, total: 0 };
    topicMap[q.topic].total++;
    if (isCorrect) topicMap[q.topic].correct++;
  });
  const percent = Math.round((correctCount / total) * 100);
  const topics = Object.entries(topicMap).sort((a, b) => a[1].correct / a[1].total - b[1].correct / b[1].total);
  return (
    <div className="max-w-2xl mx-auto px-6 py-14">
      <div className="text-center mb-10">
        <div className="f-mono text-xs uppercase tracking-widest mb-2" style={{ color: C.slate }}>{course.code} Result</div>
        <div className="f-display font-bold text-6xl" style={{ color: percent >= 50 ? C.gold : C.copper }}>{percent}%</div>
        <div className="f-body text-sm mt-2" style={{ color: C.slate }}>{correctCount} / {total} correct · {fmtTime(timeUsed)} used</div>
      </div>
      <div className="mb-10">
        <div className="f-display font-bold text-sm mb-4" style={{ color: C.ivory }}>Topic breakdown</div>
        <div className="space-y-3">
          {topics.map(([topic, t]) => {
            const pct = Math.round((t.correct / t.total) * 100);
            return (
              <div key={topic}>
                <div className="flex justify-between f-body text-xs mb-1" style={{ color: C.slate }}>
                  <span>{topic}</span><span className="f-mono">{t.correct}/{t.total}</span>
                </div>
                <div className="h-2 rounded-full overflow-hidden" style={{ background: "rgba(255,255,255,0.06)" }}>
                  <div className="h-full rounded-full" style={{ width: `${pct}%`, background: pct >= 60 ? `linear-gradient(90deg, ${C.gold}, ${C.goldBright})` : C.copper }} />
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {!leaderboardSaved ? (
        <div className="rounded-lg p-4 mb-6" style={{ border: `1px solid ${C.hair}` }}>
          <div className="f-body text-sm mb-3" style={{ color: C.ivory }}>Post this score to the leaderboard?</div>
          <div className="flex gap-2">
            <input value={savingName} onChange={(e) => setSavingName(e.target.value)} placeholder="Your name" maxLength={24}
              className="flex-1 f-body text-sm rounded-md px-3 py-2 outline-none"
              style={{ background: "rgba(255,255,255,0.04)", color: C.ivory, border: `1px solid ${C.hair}` }} />
            <GoldButton onClick={() => onSaveLeaderboard(percent, correctCount, total)} disabled={!savingName.trim()}>Save</GoldButton>
          </div>
        </div>
      ) : (
        <div className="f-body text-sm mb-6" style={{ color: C.gold }}>✓ Saved to leaderboard</div>
      )}
      <div className="grid grid-cols-2 gap-3">
        <GoldButton variant="ghost" onClick={onRetake}>↻ Retake</GoldButton>
        <GoldButton onClick={() => setScreen("leaderboard")}>🏆 Leaderboard</GoldButton>
      </div>
      <button onClick={() => setScreen("courses")} className="w-full text-center f-mono text-xs mt-5" style={{ color: C.slate }}>&larr; Back to all courses</button>
    </div>
  );
}

function Leaderboard() {
  const [activeId, setActiveId] = React.useState(COURSES[0].id);
  const [data, setData] = React.useState({});
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true);
      const result = await fetchLeaderboard(activeId);
      if (!cancelled) { setData((prev) => ({ ...prev, [activeId]: result })); setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [activeId]);
  const entries = (data[activeId] || []).slice().sort((a, b) => b.percent - a.percent);
  return (
    <div className="max-w-2xl mx-auto px-6 py-14">
      <h1 className="f-display font-bold text-3xl mb-2" style={{ color: C.ivory }}>Leaderboard</h1>
      <p className="f-body text-sm mb-8" style={{ color: C.slate }}>Top scores shared by everyone using this app.</p>
      <div className="flex gap-2 mb-6">
        {COURSES.map((c) => (
          <button key={c.id} onClick={() => setActiveId(c.id)} className="f-mono text-xs px-3 py-1.5 rounded-full uppercase tracking-widest"
            style={{ background: activeId === c.id ? C.gold : "transparent", color: activeId === c.id ? "#0a0a0b" : C.slate, border: `1px solid ${activeId === c.id ? C.gold : C.hair}` }}>
            {c.id}
          </button>
        ))}
      </div>
      {loading ? (
        <div className="f-body text-sm" style={{ color: C.slate }}>Loading...</div>
      ) : entries.length === 0 ? (
        <div className="f-body text-sm" style={{ color: C.slate }}>No scores yet for this course — be the first.</div>
      ) : (
        <div className="space-y-2">
          {entries.map((e, i) => (
            <div key={i} className="flex items-center justify-between rounded-lg px-4 py-3" style={{ border: `1px solid ${C.hair}` }}>
              <div className="flex items-center gap-3">
                <div className="f-mono font-bold w-6" style={{ color: i < 3 ? C.gold : C.slate }}>{i + 1}</div>
                <div className="f-body text-sm" style={{ color: C.ivory }}>{e.name}</div>
              </div>
              <div className="flex items-center gap-3">
                <div className="f-mono text-xs" style={{ color: C.slate }}>{e.score}/{e.total}</div>
                <div className="f-mono font-bold text-sm" style={{ color: C.gold }}>{e.percent}%</div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState("home");
  const [activeCourse, setActiveCourse] = React.useState(null);
  const [examQuestions, setExamQuestions] = React.useState([]);
  const [currentIdx, setCurrentIdx] = React.useState(0);
  const [answers, setAnswers] = React.useState({});
  const [timeLeft, setTimeLeft] = React.useState(0);
  const [showSubmitModal, setShowSubmitModal] = React.useState(false);
  const [examStartedAt, setExamStartedAt] = React.useState(null);
  const [timeUsed, setTimeUsed] = React.useState(0);
  const [leaderboardSaved, setLeaderboardSaved] = React.useState(false);
  const [savingName, setSavingName] = React.useState("");

  React.useEffect(() => {
    const name = getLocal("profile:name", "");
    if (name) setSavingName(name);
  }, []);

  React.useEffect(() => {
    if (screen !== "exam") return;
    if (timeLeft <= 0) { handleSubmit(); return; }
    const t = setTimeout(() => setTimeLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [screen, timeLeft]);

  function startExam() {
    const cfg = getExamConfig(activeCourse);
    const chosen = sample(activeCourse.bank, cfg.total);
    const prepped = chosen.map((q) => {
      const order = shuffleArr(q.options.map((_, i) => i));
      return { q: q.q, topic: q.topic, options: order.map((i) => q.options[i]), correct: order.indexOf(q.correct) };
    });
    setExamQuestions(prepped);
    setCurrentIdx(0);
    setAnswers({});
    setTimeLeft(cfg.minutes * 60);
    setExamStartedAt(Date.now());
    setLeaderboardSaved(false);
    setScreen("exam");
  }

  function handleSubmit() {
    const used = examStartedAt ? Math.round((Date.now() - examStartedAt) / 1000) : 0;
    setTimeUsed(used);
    setShowSubmitModal(false);
    saveHistoryEntry(used);
    setScreen("results");
  }

  function saveHistoryEntry(used) {
    if (!activeCourse) return;
    let correct = 0;
    examQuestions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });
    const percent = Math.round((correct / examQuestions.length) * 100);
    const entry = { date: new Date().toISOString(), score: correct, total: examQuestions.length, percent, timeUsed: used };
    const current = getLocal("history:" + activeCourse.id, []);
    setLocal("history:" + activeCourse.id, [entry, ...current].slice(0, 20));
  }

  async function handleSaveLeaderboard(percent, score, total) {
    if (!activeCourse || !savingName.trim()) return;
    setLocal("profile:name", savingName.trim());
    const result = await postLeaderboard(activeCourse.id, { name: savingName.trim(), score, total, percent });
    if (result) setLeaderboardSaved(true);
  }

  let body;
  if (screen === "home") body = <Home setScreen={setScreen} />;
  else if (screen === "courses") body = <CourseList setScreen={setScreen} setActiveCourse={setActiveCourse} />;
  else if (screen === "instructions" && activeCourse) body = <Instructions course={activeCourse} setScreen={setScreen} onStart={startExam} />;
  else if (screen === "exam" && examQuestions.length > 0)
    body = <Exam course={activeCourse} questions={examQuestions} currentIdx={currentIdx} setCurrentIdx={setCurrentIdx}
      answers={answers} setAnswers={setAnswers} timeLeft={timeLeft} onSubmitRequest={() => setShowSubmitModal(true)} />;
  else if (screen === "results" && activeCourse)
    body = <Results course={activeCourse} questions={examQuestions} answers={answers} timeUsed={timeUsed} setScreen={setScreen}
      onRetake={startExam} leaderboardSaved={leaderboardSaved} onSaveLeaderboard={handleSaveLeaderboard}
      savingName={savingName} setSavingName={setSavingName} />;
  else if (screen === "leaderboard") body = <Leaderboard />;
  else body = <Home setScreen={setScreen} />;

  return (
    <div className="min-h-screen f-body" style={{ background: C.void, color: C.ivory }}>
      <TopNav screen={screen} setScreen={setScreen} />
      {body}
      {showSubmitModal && (
        <SubmitModal answeredCount={Object.keys(answers).length} total={examQuestions.length}
          onCancel={() => setShowSubmitModal(false)} onConfirm={handleSubmit} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
